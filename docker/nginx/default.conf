server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php;

    client_max_body_size 20M;

    # ── Nagłówki bezpieczeństwa HTTP ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # CSP – zezwala na CDN (Tailwind, Alpine, Flatpickr) i zasoby Filament
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_REAL_IP         $http_x_real_ip;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
